# ── Monitor ──────────────────────────────────────────────
# Add your own monitor lines here, e.g.:
# monitor = eDP-1, 1920x1080@60, 0x0, 1
monitor = , preferred, auto, 1

# ── Environment ───────────────────────────────────────────
env = XCURSOR_THEME, Bibata-Modern-Ice
env = XCURSOR_SIZE, 24
env = HYPRCURSOR_SIZE, 24
env = GDK_BACKEND, wayland,x11
env = QT_QPA_PLATFORM, wayland
env = SDL_VIDEODRIVER, wayland
env = MOZ_ENABLE_WAYLAND, 1

# ── Autostart ─────────────────────────────────────────────
exec-once = swww-daemon
exec-once = waybar
exec-once = swaync
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = hyprctl setcursor Bibata-Modern-Ice 24

# Restore last wallpaper (set by wallpaper script)
exec-once = ~/.config/hypr/scripts/wallpaper.sh --restore

# ── Input ─────────────────────────────────────────────────
input {
    kb_layout = us
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = false
        scroll_factor = 1.0
        disable_while_typing = false
    }
}

# ── General ───────────────────────────────────────────────
general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2
    col.active_border = rgba(89b4faee) rgba(cba6f7ee) 45deg
    col.inactive_border = rgba(313244aa)
    layout = dwindle
    resize_on_border = true
}

# ── Decoration ────────────────────────────────────────────
decoration {
    rounding = 12
    active_opacity = 1.0
    inactive_opacity = 0.92

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        ignore_opacity = true
        xray = false
        popups = true
    }

    shadow {
        enabled = true
        range = 24
        render_power = 2
        color = rgba(00000055)
    }
}

# Blur waybar pills
layerrule = blur on , namespace:waybar
layerrule = ignore_alpa , namespace:waybar

# ── Animations ────────────────────────────────────────────
animations {
    enabled = true

    bezier = md3_decel,  0.05, 0.7, 0.1, 1
    bezier = md3_accel,  0.3, 0, 0.8, 0.15
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07

    animation = windows,    1, 3,  md3_decel,  popin 60%
    animation = windowsIn,  1, 3,  md3_decel,  popin 60%
    animation = windowsOut, 1, 3,  md3_accel,  popin 60%
    animation = fade,       1, 3,  md3_decel
    animation = layersIn,   1, 3,  menu_decel, slide
    animation = layersOut,  1, 2,  menu_accel
    animation = workspaces, 1, 5,  menu_decel, slide
}

# ── Layout ────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

binds {
    allow_workspace_cycles = true
}

# ── Misc ──────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    initial_workspace_tracking = 1
    allow_session_lock_restore = true
}

# ── Keybindings ───────────────────────────────────────────
$mod = SUPER
$scripts = ~/.config/hypr/scripts

# Applications
bind = $mod, Return, exec, kitty
bind = $mod, B, exec, brave
bind = $mod, E, exec, kitty -e yazi

# App launcher
bind = $mod, Space, exec, rofi -show drun

# Clipboard
bind = $mod, V, exec, cliphist list | rofi -dmenu -p "clipboard" | cliphist decode | wl-copy

# Screenshots
bind = $mod, Print, exec, grim -g "$(slurp)" - | wl-copy
bind = , Print, exec, grim - | wl-copy

# Wallpaper
bind = $mod SHIFT, W, exec, $scripts/wallpaper.sh --random

# Waybar
bind = $mod SHIFT, B, exec, pkill waybar; waybar &
bind = $mod CTRL,  B, exec, pkill -SIGUSR1 waybar

# Hyprland
bind = $mod CTRL, R, exec, hyprctl reload
bind = $mod CTRL, L, exec, pidof hyprlock || hyprlock

# Windows
bind = $mod, Q, killactive
bind = $mod, F, fullscreen, 0
bind = $mod, M, fullscreen, 1
bind = $mod, T, togglefloating
bind = $mod, J, layoutmsg, togglesplit

bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d

bind = $mod SHIFT, left,  resizeactive, -80 0
bind = $mod SHIFT, right, resizeactive, 80 0
bind = $mod SHIFT, up,    resizeactive, 0 -80
bind = $mod SHIFT, down,  resizeactive, 0 80

bind = $mod ALT, left,  swapwindow, l
bind = $mod ALT, right, swapwindow, r
bind = $mod ALT, up,    swapwindow, u
bind = $mod ALT, down,  swapwindow, d

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

binde = ALT, Tab, cyclenext
binde = ALT, Tab, bringactivetotop

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1

# Fn keys
bind   = , XF86MonBrightnessUp,   exec, brightnessctl -q s +10%
bind   = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-
bindle = , XF86AudioRaiseVolume,  exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind   = , XF86AudioMute,         exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind   = , XF86AudioMicMute,      exec, pactl set-source-mute @DEFAULT_SOURCE@ toggle
bind   = , XF86AudioPlay,         exec, playerctl play-pause
bind   = , XF86AudioNext,         exec, playerctl next
bind   = , XF86AudioPrev,         exec, playerctl previous
bind   = , XF86Lock,              exec, hyprlock
