general {
    ignore_empty_input = true
}

background {
    monitor =
    path = ~/.config/hypr/wallpaper_current
    blur_passes = 3
    blur_size = 7
    brightness = 0.5
}

input-field {
    monitor =
    size = 260, 52
    position = 0, -120
    halign = center
    valign = center

    rounding = 14
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.15
    dots_center = true

    inner_color = rgba(17, 17, 27, 0.85)
    font_color = rgb(205, 214, 244)
    outer_color = rgba(137, 180, 250, 0.8)

    fade_on_empty = true
    placeholder_text = <i>password</i>
    hide_input = false
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(205, 214, 244, 0.9)
    font_size = 64
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}
